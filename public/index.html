<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk to Krishna | Divine Onboarding</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --peacock-blue: #1E3A8A;
            --divine-gold: #D4AF37;
            --soft-cream: #FFF7E6;
            --text-main: #1e293b;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--soft-cream);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(30, 58, 138, 0.05) 0%, transparent 40%);
        }

        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 60px;
            background: var(--white);
            padding: 60px;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(30, 58, 138, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.15);
            position: relative;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-text {
            color: var(--divine-gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 3.8rem);
            color: var(--peacock-blue);
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .description {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #64748b;
            margin-bottom: 32px;
            font-style: italic;
        }

        .onboarding-image-wrapper {
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .onboarding-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .form-section {
            background: #FDFBFA;
            padding: 48px;
            border-radius: 32px;
            border: 1px solid rgba(212, 175, 55, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--peacock-blue);
            margin-bottom: 12px;
        }

        .form-header p {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--divine-gold);
            margin-bottom: 10px;
            padding-left: 2px;
        }

        input {
            width: 100%;
            padding: 18px 24px;
            border-radius: 14px;
            border: 1px solid rgba(30, 58, 138, 0.1);
            background: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: var(--text-main);
        }

        input:focus {
            outline: none;
            border-color: var(--divine-gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--peacock-blue);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #162a63;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2);
        }

        #status {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success { display: block; background: #ecfdf5; color: #059669; border: 1px solid #10b981; }
        .error { display: block; background: #fef2f2; color: #dc2626; border: 1px solid #ef4444; }

        /* --- RESPONSIVE --- */

        @media (max-width: 1024px) {
            .container {
                padding: 40px;
                gap: 40px;
            }
        }

        @media (max-width: 900px) {
            body {
                padding: 16px;
                align-items: flex-start;
            }

            .container {
                grid-template-columns: 1fr;
                padding: 32px;
                border-radius: 24px;
                gap: 48px;
            }

            .brand-section {
                text-align: center;
                align-items: center;
            }

            .description {
                max-width: 500px;
            }

            .form-section {
                padding: 32px;
                background: var(--white);
                border: 1px solid rgba(30, 58, 138, 0.05);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 20px;
                gap: 32px;
            }

            .form-section {
                padding: 24px 20px;
            }

            h1 {
                margin-bottom: 16px;
            }

            .onboarding-image-wrapper {
                border-radius: 20px;
            }

            .logo-text {
                letter-spacing: 3px;
                font-size: 0.7rem;
            }

            .form-header h2 {
                font-size: 1.8rem;
            }
        }

        .peacock-feather {
            position: absolute;
            bottom: -40px;
            right: -20px;
            font-size: 120px;
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-section">
            <span class="logo-text">Talk to Krishna</span>
            <h1>Divine<br>Conversation</h1>
            <p class="description">"You are not here by accident."<br>Begin your journey towards clarity and peace.</p>
            <div class="onboarding-image-wrapper">
                <img src="/onboarding.png" class="onboarding-image" alt="Divine Meditation" onerror="this.src='https://images.unsplash.com/photo-1545389336-cf09bd699bfe?auto=format&fit=crop&w=600&q=80'">
            </div>
        </div>

        <div class="form-section">
            <div class="form-header">
                <h2>Welcome</h2>
                <p>Enter your details to manifest your first conversation with Krishna.</p>
            </div>
            
            <form id="emailForm">
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" id="name" placeholder="E.g. Bodhi Seeker" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="seeker@example.com" required>
                </div>
                <button type="submit" id="submitBtn" class="btn-submit">Begin Journey</button>
            </form>
            <div id="status"></div>
        </div>
        
        <div class="peacock-feather">🦚</div>
    </div>

    <script>
        const form = document.getElementById('emailForm');
        const statusDiv = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value;

            submitBtn.disabled = true;
            submitBtn.innerText = 'Manifesting...';
            statusDiv.className = '';
            statusDiv.innerText = '';
            statusDiv.style.display = 'none';

            try {
                const response = await fetch('/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name })
                });

                const data = await response.json();

                if (response.ok) {
                    statusDiv.innerText = '✨ The divine invitation has been sent.';
                    statusDiv.className = 'success';
                } else {
                    const errorMsg = data.message || (data.error && data.error.message) || 'Transmission failed';
                    statusDiv.innerText = `❌ ${errorMsg}`;
                    statusDiv.className = 'error';
                }
            } catch (err) {
                statusDiv.innerText = '❌ Connection lost. Please try again.';
                statusDiv.className = 'error';
            } finally {
                statusDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Begin Journey';
            }
        });
    </script>
</body>
</html>
